name: Sync Products from Airtable to Algolia

on:
  schedule:
    # Ejecutar cada hora (minuto 0 de cada hora)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Sync products
        run: |
          curl -X GET https://airtable-products-api.vercel.app/api/sync
          
      - name: Check sync status
        run: echo "Sincronización completada"
